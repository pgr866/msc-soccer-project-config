server:
  port: 8080

management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: "health,info,gateway,metrics"
  endpoint:
    health:
      show-details: always

info:
  application:
    name: ${spring.application.name}
    description: ${spring.application.description}
    version: ${spring.application.version}

spring:
  main:
    web-application-type: reactive
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true

eureka:
  instance:
    hostname: gateway
    instanceId: ${eureka.instance.hostname}:${spring.application.name}:${spring.application.instance_id:${random.value}}
  client:
    serviceUrl:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

---
spring:
  config:
    activate:
      on-profile: prod
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
              url-expression: "'https://' + serviceId + '-${GCP_PROJECT_NUMBER}.${REGION}.run.app'"

eureka:
  instance:
    hostname: gateway-${GCP_PROJECT_NUMBER}.${REGION}.run.app
    statusPageUrl: "https://gateway-${GCP_PROJECT_NUMBER}.${REGION}.run.app/actuator/info"
    healthCheckUrl: "https://gateway-${GCP_PROJECT_NUMBER}.${REGION}.run.app/actuator/health"
    homePageUrl: "https://gateway-${GCP_PROJECT_NUMBER}.${REGION}.run.app/"
  client:
    serviceUrl:
      defaultZone: ${EUREKA_SERVER_URL}
